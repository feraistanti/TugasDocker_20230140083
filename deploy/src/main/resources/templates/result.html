<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hasil Submit - My Website</title>
    <link rel="stylesheet" href="/static.css/style.css">
</head>
<body style="text-align: center; padding: 50px; background-color: #fff0f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">

<div style="background: white; padding: 40px; border-radius: 25px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: 3px solid #ff69b4; min-width: 350px;">

    <div style="margin-bottom: 20px;">
        <img th:src="@{'/static.css/' + ${foto}}"
             width="180" height="180"
             style="border-radius: 50%; object-fit: cover; border: 6px solid #ff69b4; background-color: #eee;"
             alt="Foto Profil">
    </div>

    <h2 th:text="${nama}" style="color: #ff1493; margin-bottom: 5px; font-size: 28px;">Nama Mahasiswa</h2>

    <p style="font-style: italic; color: #666; margin-bottom: 25px; font-size: 18px;">
        "<span th:text="${kataKata}">Semangat terus belajarnya!</span>"
    </p>

    <hr style="border: 1px solid #ffc0cb; margin-bottom: 20px;">

    <table style="width: 100%; border-collapse: collapse; margin-top: 15px; border-radius: 10px; overflow: hidden;">
        <tr style="background-color: #ff69b4; color: white;">
            <th style="padding: 12px;">NIM</th>
            <th style="padding: 12px;">Jenis Kelamin</th>
        </tr>
        <tr style="background-color: #fff5f7;">
            <td style="padding: 12px; border: 1px solid #ffc0cb;" th:text="${nim}">NIM Kamu</td>
            <td style="padding: 12px; border: 1px solid #ffc0cb;" th:text="${jk}">Jenis Kelamin</td>
        </tr>
    </table>

    <br><br>
    <a href="/home" style="display: inline-block; padding: 10px 20px; background-color: #ff69b4; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s;">
        ← Kembali ke Input Data
    </a>
</div>

</body>
</html>
